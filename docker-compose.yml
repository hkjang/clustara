# 오프라인망에서 docker load 한 이미지를 그대로 사용한다.
# 실제 환경에서는 .env 파일에 UPSTREAM_API_KEY 등 비밀값을 두고 docker compose up -d 로 실행.
services:
  gateway:
    image: clustara:${GATEWAY_VERSION:-latest}
    container_name: clustara
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./data:/data
    environment:
      LISTEN_ADDR: ":9090"
      UPSTREAM_PROVIDER: ${UPSTREAM_PROVIDER:-openai}
      UPSTREAM_BASE_URL: ${UPSTREAM_BASE_URL:-https://api.openai.com}
      UPSTREAM_API_KEY: ${UPSTREAM_API_KEY:-}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      ADMIN_IP_ALLOWLIST_ENABLED: ${ADMIN_IP_ALLOWLIST_ENABLED:-false}
      ADMIN_IP_ALLOWED_CIDRS: ${ADMIN_IP_ALLOWED_CIDRS:-}
      ADMIN_TRUSTED_PROXY_CIDRS: ${ADMIN_TRUSTED_PROXY_CIDRS:-}
      ADMIN_IP_EMERGENCY_TOKEN: ${ADMIN_IP_EMERGENCY_TOKEN:-}
      K8S_SERVICE_RECONCILE_ENABLED: ${K8S_SERVICE_RECONCILE_ENABLED:-true}
      K8S_SERVICE_RECONCILE_INTERVAL_SECONDS: ${K8S_SERVICE_RECONCILE_INTERVAL_SECONDS:-300}
      K8S_SERVICE_RECONCILE_BATCH_SIZE: ${K8S_SERVICE_RECONCILE_BATCH_SIZE:-100}
      K8S_SERVICE_RECONCILE_TIMEOUT_SECONDS: ${K8S_SERVICE_RECONCILE_TIMEOUT_SECONDS:-30}
      K8S_SERVICE_INVENTORY_STALE_SECONDS: ${K8S_SERVICE_INVENTORY_STALE_SECONDS:-900}
      K8S_SERVICE_JUPYTERHUB_IDLE_THRESHOLD_MINUTES: ${K8S_SERVICE_JUPYTERHUB_IDLE_THRESHOLD_MINUTES:-60}
      K8S_SERVICE_JUPYTERHUB_HTTP_TIMEOUT_SECONDS: ${K8S_SERVICE_JUPYTERHUB_HTTP_TIMEOUT_SECONDS:-10}
      K8S_SERVICE_JUPYTERHUB_USER_LIMIT: ${K8S_SERVICE_JUPYTERHUB_USER_LIMIT:-500}
      K8S_SERVICE_HEALTH_RETENTION_DAYS: ${K8S_SERVICE_HEALTH_RETENTION_DAYS:-90}
      GATEWAY_SECRET: ${GATEWAY_SECRET:-change-me-please}
      MODEL_PRICING_KRW_PER_1M: ${MODEL_PRICING_KRW_PER_1M:-{}}
      LOG_RAW_PROMPTS: ${LOG_RAW_PROMPTS:-false}
      DB_DRIVER: sqlite
      DB_DSN: /data/gateway.db
      LOG_FALLBACK_PATH: /data/fallback.ndjson
