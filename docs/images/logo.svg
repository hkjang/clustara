<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>
  <!-- Vertical diamond representing cluster structure -->
  <polygon points="50,12 63,50 50,88 37,50" fill="url(#starGrad)" />
  <!-- Horizontal diamond representing operations scale -->
  <polygon points="12,50 50,63 88,50 50,37" fill="url(#starGrad)" opacity="0.8" />
  <!-- Central control plane core -->
  <circle cx="50" cy="50" r="9" fill="#ffffff" />
  <circle cx="50" cy="50" r="5" fill="#3b82f6" />
</svg>
